<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Sentry{% block title %}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <nav class="border-b border-zinc-800 px-6 py-4 flex items-center gap-4">
    <a href="/" class="text-violet-400 font-bold text-lg tracking-tight">⬡ Mini Sentry</a>
    <span class="text-zinc-600 text-sm">self-hosted error tracker</span>
  </nav>
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
