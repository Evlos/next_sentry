{% extends "base.html" %}
{% block title %} — Projects{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-8">
  <h1 class="text-2xl font-semibold text-zinc-100">Projects</h1>
  <form method="POST" action="/projects/create" class="flex gap-2">
    <input name="name" required placeholder="New project name"
      class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-100
             placeholder-zinc-500 focus:outline-none focus:border-violet-500 w-56"/>
    <button type="submit"
      class="bg-violet-600 hover:bg-violet-500 text-white text-sm px-4 py-2 rounded transition">
      + Create
    </button>
  </form>
</div>

{% if projects %}
<div class="grid gap-3">
  {% for p in projects %}
  <a href="/projects/{{ p.id }}"
     class="flex items-center justify-between bg-zinc-900 border border-zinc-800
            hover:border-violet-600 rounded-lg px-5 py-4 transition group">
    <div>
      <div class="font-medium text-zinc-100 group-hover:text-violet-300 transition">{{ p.name }}</div>
      <div class="text-xs text-zinc-500 mt-1">Created {{ p.created_at }}</div>
    </div>
    <div class="flex items-center gap-3">
      <span class="{% if p.event_count > 0 %}bg-red-900 text-red-300{% else %}bg-zinc-800 text-zinc-400{% endif %}
                   text-xs font-mono px-2 py-1 rounded-full">
        {{ p.event_count }} events
      </span>
      <svg class="w-4 h-4 text-zinc-600 group-hover:text-violet-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </div>
  </a>
  {% endfor %}
</div>
{% else %}
<div class="text-center py-20 text-zinc-500">
  <div class="text-4xl mb-3">🪲</div>
  <div class="text-sm">No projects yet. Create one above.</div>
</div>
{% endif %}
{% endblock %}
